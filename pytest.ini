[pytest]
# Put BOTH the project root and src/ on sys.path so the tests import whether
# they are written as `from src.recommender import ...` (root on path) or
# `from recommender import ...` (src on path). This makes `pytest` /
# `python -m pytest` work from the project root regardless of which spelling
# the editor leaves on line 1.
pythonpath = . src
testpaths = tests
